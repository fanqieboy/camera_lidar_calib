
# 相机模型参数文件路径
camera_model_path: "/home/gyw/dataset/calib/intrinsic/embosense_20260319_182042_0000/cameras/camera_3/20260319181933_945963852/camera3_camera_calib.yaml"

x_min: 1.8
x_max: 2.25
y_min: -1.2
y_max: 1.2
z_min: -1
z_max: 1

# 标定板参数
marker_size: 0.16                   # ArUco 标记尺寸 (米)
delta_width_qr_center: 0.55         # QR 中心宽度偏移
delta_height_qr_center: 0.35        # QR 中心高度偏移
delta_width_circles: 0.5            # 圆形宽度偏移
delta_height_circles: 0.4           # 圆形高度偏移
circle_radius: 0.12                 # 圆形半径 (米)
min_detected_markers: 3             # 最小检测标记数


# 文件路径
image_path: "./data/image.png"      # 图像文件路径
# output_path: "/home/gyw/lidar_camera_calib/output/10_27/cam1/10"             # 输出目录路径
output_path: "./output/seer/cam3"

# 数据集根目录 (包含 cameras/ 和 lidar/ 目录)
dataset_dir: "/home/gyw/dataset/calib/extrinsic/cam3/embosense_20260319_190433_0013/"

# 相机ID过滤 (如 "camera_0")，仅用于检测相机数据，不含相机相对雷达朝向信息
camera_id: "camera_3"

# 相机与雷达朝向的相对位置
#    - 0: 正前方 (基准，坐标不变)
#    - 1: 相机在雷达背后
#    - 2: 相机在雷达左侧
#    - 3: 相机在雷达右侧
camera_direction: 2

# 雷达安装附加偏航角偏差（度，逆时针为正），叠加在 camera_direction 基础角度之上。
# 默认不填或填 0.0 表示无偏差，行为与旧版完全一致。
# 用途：补偿雷达物理安装不对齐的情况（非0°/90°/180°/270°的任意偏差）。
# 实际旋转角 = camera_direction对应角度 + lidar_yaw_offset_deg
# 示例：camera_direction=0，雷达X轴在相机正前方逆时针135°处
#        → 需顺时针旋转135°对齐 → lidar_yaw_offset_deg: -135.0
lidar_yaw_offset_deg: 135.0

# 最大PCD文件合并数量，-1表示不限制
max_pcds: -1

# 可选参数 (独立版本特有，只能通过配置文件设置)
enable_visualization: true          # 是否启用可视化 (仅配置文件)
save_intermediate_results: true    # 是否保存中间结果 (仅配置文件)
show_failed_results: true          # 是否在失败时显示中间结果进行诊断 (仅配置文件)
continue_on_partial_failure: true  # 多场景模式下是否在部分失败时继续 (仅配置文件)
log_level: "INFO"                   # 日志级别: DEBUG, INFO, WARN, ERROR

# 去畸变预处理参数 (v2.2+ 新功能，仅配置文件)
preserve_original_data: true       # 是否保留原始数据 (仅配置文件)